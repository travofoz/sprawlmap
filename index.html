<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sprawlmap</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d1117;color:#e6edf3;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#bar{display:flex;align-items:center;gap:6px;padding:8px;background:#161b22;border-bottom:1px solid #30363d;z-index:1000;flex-wrap:wrap}
#bar h1{font-size:15px;font-weight:700;color:#58a6ff;margin-right:4px}
.btn{background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap}
.btn:active,.btn.active{background:#388bfd22;border-color:#58a6ff;color:#58a6ff}
.btn.green{border-color:#3fb950;color:#3fb950}
#status{font-size:11px;color:#8b949e;padding:3px 8px;background:#0d1117;border-bottom:1px solid #21262d}
#map{flex:1}
#panel{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:2px solid #30363d;max-height:55dvh;display:flex;flex-direction:column;z-index:2000;transform:translateY(100%);transition:transform .25s ease}
#panel.open{transform:translateY(0)}
#ptab{display:flex;border-bottom:1px solid #30363d}
.tab{flex:1;padding:8px;font-size:12px;text-align:center;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
#pscroll{overflow-y:auto;flex:1;padding:10px}
.card{background:#0d1117;border-radius:8px;padding:10px;margin-bottom:8px;border-left:4px solid #30363d}
.card.low{border-color:#3fb950}.card.med{border-color:#d29922}.card.avoid,.card.high{border-color:#f85149}
.card h3{font-size:12px;color:#58a6ff;margin-bottom:5px;line-height:1.4}
.card p{font-size:11px;color:#8b949e;line-height:1.7}
.card a{color:#58a6ff;text-decoration:none}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;margin-bottom:4px}
.badge.low{background:#1a4d2e;color:#3fb950}
.badge.med{background:#3d2b00;color:#d29922}
.badge.avoid,.badge.high{background:#3d0000;color:#f85149}
#llm-input{display:flex;gap:6px;padding:8px;border-bottom:1px solid #30363d}
#llm-input textarea{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:6px 8px;font-size:12px;resize:none;height:52px;font-family:inherit}
#llm-output{overflow-y:auto;padding:10px;font-size:12px;line-height:1.7;color:#c9d1d9;min-height:60px}
#llm-output .thinking{color:#8b949e;font-style:italic}
#llm-output .answer{white-space:pre-wrap}
#settings-panel{display:none;position:fixed;inset:0;background:#0d1117f0;z-index:3000;overflow-y:auto;padding:20px}
#settings-panel.open{display:block}
#settings-panel h2{color:#58a6ff;margin-bottom:16px}
.sg{margin-bottom:16px}
.sg label{display:block;font-size:12px;color:#8b949e;margin-bottom:4px}
.sg select,.sg input{width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:8px;font-size:13px}
#handle{text-align:center;padding:6px;cursor:pointer;color:#8b949e;font-size:18px}
</style>
</head>
<body>
<div id="bar">
  <h1>🗺 Sprawlmap</h1>
  <button class="btn" id="locBtn">📍 Me</button>
  <button class="btn" id="searchBtn">🔍 Search</button>
  <button class="btn" id="resBtn">💡 Resources</button>
  <button class="btn green" id="askBtn">🤖 Ask</button>
  <button class="btn" id="settingsBtn">⚙️</button>
</div>
<div id="status">Move map then tap Search, or tap Me for GPS</div>
<div id="map"></div>

<div id="panel">
  <div id="handle">⌄</div>
  <div id="ptab">
    <div class="tab active" data-tab="parcels">🏛 Parcels</div>
    <div class="tab" data-tab="resources">💡 Resources</div>
    <div class="tab" data-tab="ask">🤖 Ask</div>
  </div>
  <div id="pscroll">
    <div id="tab-parcels"><p style="color:#8b949e;font-size:12px">Search an area to see public parcels.</p></div>
    <div id="tab-resources" style="display:none"><p style="color:#8b949e;font-size:12px">Tap Resources to load.</p></div>
    <div id="tab-ask" style="display:none">
      <div id="llm-input">
        <textarea id="q" placeholder="e.g. 'Public land near a laundromat and bus stop?' or 'Where can I charge a battery near Franklinton?'"></textarea>
        <button class="btn" id="sendQ" style="align-self:flex-end">→</button>
      </div>
      <div id="llm-output"><span class="thinking">Ask anything about this area.</span></div>
    </div>
  </div>
</div>

<div id="settings-panel">
  <h2>⚙️ Settings</h2>
  <div class="sg">
    <label>AI Provider</label>
    <select id="providerSel"></select>
  </div>
  <div class="sg">
    <label>Model</label>
    <select id="modelSel"></select>
  </div>
  <div class="sg">
    <label>API Key <span style="color:#3fb950;font-size:10px">(stored locally only)</span></label>
    <input type="password" id="apiKeyInp" placeholder="Leave blank for free OpenRouter models"/>
  </div>
  <button class="btn green" id="saveSettings" style="width:100%;padding:10px;margin-top:8px">Save</button>
  <button class="btn" id="closeSettings" style="width:100%;padding:10px;margin-top:8px">Cancel</button>
</div>

<script type="module">
import { LLM, PROVIDERS, saveKey, loadKey, bestAvailable } from './providers.js';
import {
  findPublicParcels,
  findNearbyResources,
  RESOURCE_TYPES,
  riskText,
  riskDescription
} from './api.js';

// Leaflet loaded as global from CDN
const map = L.map('map', {zoomControl: false}).setView([39.9612, -82.9988], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution: '© OSM', maxZoom: 19}).addTo(map);
L.control.zoom({position: 'topright'}).addTo(map);

let parcelLayer = L.layerGroup().addTo(map);
let resourceLayer = L.layerGroup().addTo(map);
let userMarker = null;
let curLat = 39.9612, curLon = -82.9988;

function setStatus(s) { document.getElementById('status').innerHTML = s; }

// Display parcels in panel and on map
function displayParcels(parcels) {
  parcelLayer.clearLayers();
  const el = document.getElementById('tab-parcels');

  if (!parcels.length) {
    el.innerHTML = '<p style="color:#8b949e;font-size:12px">No public parcels found.</p>';
    return;
  }

  // Count by risk
  const counts = {low: 0, med: 0, avoid: 0, high: 0};
  parcels.forEach(p => counts[p.risk] = (counts[p.risk] || 0) + 1);

  el.innerHTML = `<p style="color:#8b949e;font-size:11px;margin-bottom:8px">${parcels.length} public parcels — 🟢${counts.low} 🟡${counts.med} 🔴${counts.avoid + counts.high}</p>`;

  for (const p of parcels) {
    // Add polygon to map if geometry exists
    if (p.geometry && p.geometry.coordinates) {
      try {
        const coords = p.geometry.coordinates[0].map(c => [c[1], c[0]]); // GeoJSON is [lon,lat], Leaflet wants [lat,lon]
        const color = {low: '#3fb950', med: '#d29922', avoid: '#f85149', high: '#f85149'}[p.risk];
        L.polygon(coords, {
          color: color,
          fillColor: color,
          fillOpacity: 0.2,
          weight: 2
        })
        .bindPopup(`<b>${p.address || 'No address'}</b><br>${p.luc_label}<br><a href="${p.property_card}" target="_blank">Property Card</a>`)
        .addTo(parcelLayer);
      } catch (e) { /* skip bad geometry */ }
    }

    // Card in panel
    const d = document.createElement('div');
    d.className = `card ${p.risk}`;
    d.innerHTML = `
      <span class="badge ${p.risk}">${riskText(p.risk)}</span>
      <h3>${p.address || '(no address)'}</h3>
      <p>
        <b>Owner:</b> ${p.owner || ''}<br>
        <b>LUC:</b> ${p.usecd} — ${p.luc_label}<br>
        <b>Risk:</b> ${p.risk_desc}<br>
        <b>Acres:</b> ${(p.acres || 0).toFixed(2)} | <b>Appraised:</b> $${(p.appraised || 0).toLocaleString()}<br>
        <b>Last Sale:</b> ${p.last_sale_year || 'N/A'}<br>
        <a href="${p.property_card}" target="_blank">📋 Property Card</a>
      </p>`;
    el.appendChild(d);
  }
}

// Display resources in panel and on map
function displayResources(resources) {
  resourceLayer.clearLayers();
  const el = document.getElementById('tab-resources');
  el.innerHTML = `<p style="color:#8b949e;font-size:11px;margin-bottom:8px">${resources.length} resources found</p>`;

  for (const r of resources) {
    if (!r.lat) continue;

    // Marker on map
    L.marker([r.lat, r.lon], {
      icon: L.divIcon({
        html: `<span style="font-size:18px;line-height:1">${r.icon}</span>`,
        className: '',
        iconSize: [22, 22]
      })
    })
    .bindPopup(`<b>${r.icon} ${r.name}</b>${r.address ? `<br>${r.address}` : ''}`)
    .addTo(resourceLayer);

    // Card in panel
    const c = document.createElement('div');
    c.className = 'card med';
    c.innerHTML = `<h3>${r.icon} ${r.name}</h3><p>${r.address || `${r.lat.toFixed(5)}, ${r.lon.toFixed(5)}`}<br><small>${r.dist_miles ? r.dist_miles.toFixed(2) + ' mi' : ''} ${r.source === 'hardcoded' ? '★' : ''}</small></p>`;
    el.appendChild(c);
  }
}

// Query and display parcels
async function searchParcels() {
  setStatus('⏳ Querying parcels...');
  openPanel('parcels');

  try {
    const parcels = await findPublicParcels({bounds: map.getBounds(), includeGeometry: true});
    displayParcels(parcels);
    setStatus(`✅ ${parcels.length} parcels`);
  } catch (e) {
    setStatus('❌ ' + e.message);
  }
}

// Query and display resources
async function searchResources() {
  setStatus('🔍 Loading resources...');
  openPanel('resources');

  try {
    const center = map.getCenter();
    const resources = await findNearbyResources({lat: center.lat, lon: center.lng, radiusMeters: 1200});
    displayResources(resources);
    setStatus(`✅ ${resources.length} resources`);
  } catch (e) {
    setStatus('❌ ' + e.message);
  }
}

// Ask AI
async function ask(question) {
  const out = document.getElementById('llm-output');
  out.innerHTML = '<span class="thinking">⏳ Gathering data...</span>';

  const bounds = map.getBounds();
  const center = map.getCenter();

  try {
    const [parcels, resources] = await Promise.all([
      findPublicParcels({bounds, includeGeometry: false}),
      findNearbyResources({lat: center.lat, lon: center.lng, radiusMeters: 1200})
    ]);

    out.innerHTML = '<span class="thinking">⏳ Asking AI...</span>';

    const llm = bestAvailable();
    if (!llm) {
      out.innerHTML = '<span style="color:#f85149">No AI configured. Tap ⚙️ to add a key, or use OpenRouter free tier.</span>';
      return;
    }

    const ctx = {
      location: {lat: curLat, lon: curLon},
      public_parcels: parcels.map(p => ({
        address: p.address,
        owner: p.owner,
        luc: p.usecd,
        luc_label: p.luc_label,
        risk: p.risk,
        risk_text: p.risk_text,
        acres: p.acres,
        property_card: p.property_card
      })),
      resources: resources.map(r => ({
        type: r.type,
        name: r.name,
        lat: r.lat,
        lon: r.lon,
        dist_miles: r.dist_miles
      }))
    };

    const sys = `You are Sprawlmap, a humanitarian field assistant helping people experiencing homelessness find safe public land and resources in Columbus OH.

RISK LEVELS:
- LOW (640/605): City-owned or land bank. CPD requires trespass authorization to arrest. Rarely filed proactively.
- MED (6xx other): Other public entities. Verify before use.
- AVOID (650): School district. Active enforcement - DO NOT RECOMMEND.
- HIGH: Private property. Do not recommend.

Be specific — name addresses. Prioritize LOW risk parcels. Be direct and practical.`;

    const reply = await llm.chat([{role: 'user', content: `Data:\n${JSON.stringify(ctx)}\n\nQuestion: ${question}`}], sys);
    out.innerHTML = `<div class="answer">${reply}</div>`;
  } catch (e) {
    out.innerHTML = `<span style="color:#f85149">Error: ${e.message}</span>`;
  }
}

// ── Settings ────────────────────────────────────────────────────────────────
const provSel = document.getElementById('providerSel');
const modSel = document.getElementById('modelSel');
const keyInp = document.getElementById('apiKeyInp');

for (const [k, v] of Object.entries(PROVIDERS)) {
  const o = document.createElement('option');
  o.value = k;
  o.textContent = v.label;
  provSel.appendChild(o);
}

function syncModels() {
  const p = PROVIDERS[provSel.value];
  modSel.innerHTML = '';
  for (const m of p.models) {
    const o = document.createElement('option');
    o.value = m;
    o.textContent = m;
    modSel.appendChild(o);
  }
  keyInp.value = loadKey(provSel.value) || '';
  keyInp.placeholder = p.keyHint || 'optional';
}

provSel.addEventListener('change', syncModels);
syncModels();

const sp = localStorage.getItem('scout_provider');
if (sp && PROVIDERS[sp]) { provSel.value = sp; syncModels(); }
const sm = localStorage.getItem('scout_model');
if (sm) modSel.value = sm;

document.getElementById('settingsBtn').onclick = () => document.getElementById('settings-panel').classList.add('open');
document.getElementById('closeSettings').onclick = () => document.getElementById('settings-panel').classList.remove('open');
document.getElementById('saveSettings').onclick = () => {
  saveKey(provSel.value, keyInp.value.trim());
  localStorage.setItem('scout_provider', provSel.value);
  localStorage.setItem('scout_model', modSel.value);
  document.getElementById('settings-panel').classList.remove('open');
  setStatus('✅ Settings saved');
};

// ── Map controls ─────────────────────────────────────────────────────────────
document.getElementById('locBtn').onclick = () => {
  setStatus('📡 Getting GPS...');
  navigator.geolocation.getCurrentPosition(
    pos => {
      curLat = pos.coords.latitude;
      curLon = pos.coords.longitude;
      map.setView([curLat, curLon], 15);
      if (userMarker) userMarker.remove();
      userMarker = L.circleMarker([curLat, curLon], {
        radius: 8,
        fillColor: '#58a6ff',
        fillOpacity: 1,
        color: '#fff',
        weight: 2
      }).addTo(map).bindPopup('📍 You').openPopup();
      setStatus('✅ Got location. Tap Search.');
    },
    () => setStatus('❌ GPS unavailable.')
  );
};

document.getElementById('searchBtn').onclick = searchParcels;
document.getElementById('resBtn').onclick = searchResources;
document.getElementById('askBtn').onclick = () => openPanel('ask');
document.getElementById('sendQ').onclick = () => {
  const q = document.getElementById('q').value.trim();
  if (q) ask(q);
};
document.getElementById('q').onkeydown = e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('sendQ').click();
  }
};
document.getElementById('handle').onclick = () => document.getElementById('panel').classList.toggle('open');
document.querySelectorAll('.tab').forEach(t => t.onclick = () => openPanel(t.dataset.tab));

function openPanel(tab) {
  document.getElementById('panel').classList.add('open');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  ['parcels', 'resources', 'ask'].forEach(id =>
    document.getElementById(`tab-${id}`).style.display = id === tab ? 'block' : 'none'
  );
}
</script>
</body>
</html>
