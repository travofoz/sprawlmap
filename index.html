<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Sprawlmap — Public Land Finder</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0d1117;color:#e6edf3;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#bar{display:flex;align-items:center;gap:6px;padding:8px;background:#161b22;border-bottom:1px solid #30363d;z-index:1000;flex-wrap:wrap}
#bar h1{font-size:15px;font-weight:700;color:#58a6ff;margin-right:4px}
.btn{background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap}
.btn:active,.btn.active{background:#388bfd22;border-color:#58a6ff;color:#58a6ff}
.btn.green{border-color:#3fb950;color:#3fb950}
#status{font-size:11px;color:#8b949e;padding:3px 8px;background:#0d1117;border-bottom:1px solid #21262d}
#map{flex:1}
#panel{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:2px solid #30363d;max-height:55dvh;display:flex;flex-direction:column;z-index:2000;transform:translateY(100%);transition:transform .25s ease}
#panel.open{transform:translateY(0)}
#ptab{display:flex;border-bottom:1px solid #30363d}
.tab{flex:1;padding:8px;font-size:12px;text-align:center;cursor:pointer;color:#8b949e;border-bottom:2px solid transparent}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
#pscroll{overflow-y:auto;flex:1;padding:10px}
.card{background:#0d1117;border-radius:8px;padding:10px;margin-bottom:8px;border-left:4px solid #30363d}
.card.low{border-color:#3fb950}.card.med{border-color:#d29922}.card.high{border-color:#f85149}
.card h3{font-size:12px;color:#58a6ff;margin-bottom:5px;line-height:1.4}
.card p{font-size:11px;color:#8b949e;line-height:1.7}
.card a{color:#58a6ff;text-decoration:none}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;margin-bottom:4px}
.badge.low{background:#1a4d2e;color:#3fb950}
.badge.med{background:#3d2b00;color:#d29922}
.badge.high{background:#3d0000;color:#f85149}
#llm-input{display:flex;gap:6px;padding:8px;border-bottom:1px solid #30363d}
#llm-input textarea{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:6px 8px;font-size:12px;resize:none;height:52px;font-family:inherit}
#llm-output{flex:1;overflow-y:auto;padding:10px;font-size:12px;line-height:1.7;color:#c9d1d9}
#llm-output .thinking{color:#8b949e;font-style:italic}
#llm-output .answer{white-space:pre-wrap}
#settings-panel{display:none;position:fixed;inset:0;background:#0d1117ee;z-index:3000;overflow-y:auto;padding:20px}
#settings-panel.open{display:block}
#settings-panel h2{color:#58a6ff;margin-bottom:16px}
.setting-group{margin-bottom:16px}
.setting-group label{display:block;font-size:12px;color:#8b949e;margin-bottom:4px}
.setting-group select,.setting-group input{width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:8px;font-size:13px}
#handle{text-align:center;padding:6px;cursor:pointer;color:#8b949e;font-size:18px}
</style>
</head>
<body>
<div id="bar">
  <h1>🗺 Sprawlmap</h1>
  <button class="btn" id="locBtn">📍 Me</button>
  <button class="btn" id="searchBtn">🔍 Search</button>
  <button class="btn" id="resBtn">💡 Resources</button>
  <button class="btn green" id="askBtn">🤖 Ask</button>
  <button class="btn" id="settingsBtn">⚙️</button>
</div>
<div id="status">Move map then tap Search, or tap Me for GPS</div>
<div id="map"></div>

<div id="panel">
  <div id="handle">⌄</div>
  <div id="ptab">
    <div class="tab active" data-tab="parcels">🏛 Parcels</div>
    <div class="tab" data-tab="resources">💡 Resources</div>
    <div class="tab" data-tab="ask">🤖 Ask</div>
  </div>
  <div id="pscroll">
    <div id="tab-parcels"><p style="color:#8b949e;font-size:12px">Search an area to see public parcels.</p></div>
    <div id="tab-resources" style="display:none"><p style="color:#8b949e;font-size:12px">Toggle resources on the map.</p></div>
    <div id="tab-ask" style="display:none">
      <div id="llm-input">
        <textarea id="q" placeholder="e.g. 'Is there public land near a laundromat and bus stop?' or 'Where can I charge a battery near Franklinton?'"></textarea>
        <button class="btn" id="sendQ" style="align-self:flex-end">→</button>
      </div>
      <div id="llm-output"><span class="thinking">Ask anything about this area.</span></div>
    </div>
  </div>
</div>

<div id="settings-panel">
  <h2>⚙️ Settings</h2>
  <div class="setting-group">
    <label>AI Provider</label>
    <select id="providerSelect"></select>
  </div>
  <div class="setting-group">
    <label>Model</label>
    <select id="modelSelect"></select>
  </div>
  <div class="setting-group">
    <label>API Key <span style="color:#3fb950;font-size:10px">(stored locally, never sent anywhere except the provider)</span></label>
    <input type="password" id="apiKeyInput" placeholder="Leave blank for free OpenRouter models"/>
  </div>
  <button class="btn green" id="saveSettings" style="width:100%;padding:10px;margin-top:8px">Save</button>
  <button class="btn" id="closeSettings" style="width:100%;padding:10px;margin-top:8px">Cancel</button>
</div>

<script type="module">
import { LLM, PROVIDERS, saveKey, loadKey, bestAvailable } from './providers.js';

const FC_FEATURE = 'https://gis.franklincountyohio.gov/hosting/rest/services/ParcelFeatures/Parcel_Features/FeatureServer/0/query';
const OVERPASS   = 'https://overpass-api.de/api/interpreter';
const PROP_CARD  = 'https://property.franklincountyauditor.com/_web/propertycard/propertycard.aspx?pin=';
const PUBLIC_KW  = ['CITY','COLUMBUS','FRANKLIN CO','LAND BANK','METRO PARKS','BOARD OF EDUCATION','LAND REUTILIZATION','CLRC'];

const RESOURCES = {
  bus:     {label:'Bus Stop',       icon:'🚌',q:'node["highway"="bus_stop"]'},
  laundry: {label:'Laundromat',     icon:'👕',q:'node["shop"="laundry"],node["shop"="dry_cleaning"]'},
  water:   {label:'Drinking Water', icon:'💧',q:'node["amenity"="drinking_water"]'},
  power:   {label:'Charging',       icon:'⚡',q:'node["amenity"="charging_station"]'},
  mental:  {label:'Mental Health',  icon:'🧠',q:'node["amenity"="mental_health"],node["amenity"="social_facility"]'},
  toilet:  {label:'Restroom',       icon:'🚻',q:'node["amenity"="toilets"]'},
  food:    {label:'Food Bank',      icon:'🥫',q:'node["amenity"="food_bank"],node["social_facility"="food_bank"]'},
  shelter: {label:'Shelter',        icon:'🏠',q:'node["social_facility"="shelter"]'},
  dog:     {label:'Dog Park',       icon:'🐕',q:'node["leisure"="dog_park"]'},
  wifi:    {label:'Free WiFi',      icon:'📶',q:'node["internet_access"="wlan"]'},
};

const map = L.map('map',{zoomControl:false}).setView([39.9612,-82.9988],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19}).addTo(map);
L.control.zoom({position:'topright'}).addTo(map);

let parcelLayer = L.layerGroup().addTo(map);
let resLayer    = L.layerGroup().addTo(map);
let userMarker  = null;
let currentLat  = 39.9612, currentLon = -82.9988;

const isExempt = c => parseInt(c)>=600 && parseInt(c)<700;
const isPublic = o => o && PUBLIC_KW.some(k=>(o||'').toUpperCase().includes(k));
function riskClass(u,o){const c=parseInt(u||0);if(c===640||c===605)return'low';if(c>=600&&c<700&&isPublic(o))return'med';if(isPublic(o))return'med';return'high';}
function lucLabel(c){const m={605:'Land Bank ⭐',640:'City of Columbus ⭐⭐',650:'Board of Ed',620:'Franklin County',660:'Metro Parks/COTA',610:'State of Ohio',680:'Other Exempt'};return m[String(c)]||(parseInt(c)>=600&&parseInt(c)<700?'Exempt Public':`Code ${c}`);}
function riskText(r){return{low:'🟢 LOW — city-owned, trespass auth required',med:'🟡 MED — public entity, verify',high:'🔴 HIGH — private, avoid'}[r];}
function setStatus(s){document.getElementById('status').innerHTML=s;}

async function queryParcels(bounds){
  const {_southWest:sw,_northEast:ne}=bounds;
  const where=PUBLIC_KW.map(k=>`OWNERNAME1 LIKE '%${k}%'`).join(' OR ');
  const geo=JSON.stringify({xmin:sw.lng,ymin:sw.lat,xmax:ne.lng,ymax:ne.lat,spatialReference:{wkid:4326}});
  const p=new URLSearchParams({where,geometry:geo,geometryType:'esriGeometryEnvelope',spatialRel:'esriSpatialRelIntersects',inSR:4326,outFields:'PARCELID,OWNERNAME1,USECD,SITEADDRESS,ACRES,APPRVALUE,SALEYEAR',returnGeometry:'false',resultRecordCount:80,f:'json'});
  try{const r=await fetch(`${FC_FEATURE}?${p}`);const d=await r.json();return(d.features||[]).map(f=>f.attributes);}catch(e){console.error(e);return[];}
}

function renderParcels(parcels){
  parcelLayer.clearLayers();
  const el=document.getElementById('tab-parcels');
  if(!parcels.length){el.innerHTML='<p style="color:#8b949e;font-size:12px;padding:8px">No public parcels found.</p>';return;}
  parcels.sort((a,b)=>({low:0,med:1,high:2})[riskClass(a.USECD,a.OWNERNAME1)]-({low:0,med:1,high:2})[riskClass(b.USECD,b.OWNERNAME1)]);
  el.innerHTML=`<p style="color:#8b949e;font-size:11px;margin-bottom:8px">${parcels.length} public parcels</p>`;
  parcels.forEach(p=>{
    const rc=riskClass(p.USECD,p.OWNERNAME1);
    const card=document.createElement('div');
    card.className=`card ${rc}`;
    card.innerHTML=`<span class="badge ${rc}">${riskText(rc)}</span><h3>${p.SITEADDRESS||'(no address)'}</h3><p><b>Owner:</b> ${p.OWNERNAME1||''}<br><b>LUC:</b> ${p.USECD} — ${lucLabel(p.USECD)}<br><b>Acres:</b> ${(p.ACRES||0).toFixed(2)} | <b>Appraised:</b> $${(p.APPRVALUE||0).toLocaleString()}<br><b>Last Sale:</b> ${p.SALEYEAR||'N/A'}<br><a href="${PROP_CARD}${p.PARCELID}" target="_blank">📋 Property Card</a></p>`;
    el.appendChild(card);
  });
}

async function queryResources(bounds,types){
  const {_southWest:sw,_northEast:ne}=bounds;
  const bb=`${sw.lat},${sw.lng},${ne.lat},${ne.lng}`;
  const queries=types.flatMap(t=>(RESOURCES[t]?.q||'').split(',').map(q=>`${q}(${bb});`));
  const ql=`[out:json][timeout:20];(${queries.join('')});out center;`;
  try{const r=await fetch(OVERPASS,{method:'POST',body:'data='+encodeURIComponent(ql)});const d=await r.json();return d.elements||[];}catch(e){console.error(e);return[];}
}

function renderResources(elements){
  resLayer.clearLayers();
  const el=document.getElementById('tab-resources');
  el.innerHTML=`<p style="color:#8b949e;font-size:11px;margin-bottom:8px">${elements.length} resources found</p>`;
  elements.forEach(e=>{
    const lat=e.lat||e.center?.lat,lon=e.lon||e.center?.lon;
    if(!lat)return;
    const t=e.tags||{};
    let icon='📍';
    if(t.highway==='bus_stop')icon='🚌';
    else if(t.shop==='laundry')icon='👕';
    else if(t.amenity==='drinking_water')icon='💧';
    else if(t.amenity==='charging_station')icon='⚡';
    else if(t.amenity==='toilets')icon='🚻';
    else if(t.amenity==='food_bank'||t.social_facility==='food_bank')icon='🥫';
    else if(t.social_facility==='shelter')icon='🏠';
    else if(t.leisure==='dog_park')icon='🐕';
    else if(t.internet_access==='wlan')icon='📶';
    L.marker([lat,lon],{icon:L.divIcon({html:`<div style="font-size:16px">${icon}</div>`,className:'',iconSize:[20,20]})}).addTo(resLayer).bindPopup(`<b>${icon} ${t.name||t.amenity||t.shop||t.highway||'Resource'}</b>`);
    const card=document.createElement('div');
    card.className='card med';
    card.innerHTML=`<h3>${icon} ${t.name||t.amenity||t.shop||'Resource'}</h3><p>${t['addr:street']||`${lat.toFixed(5)},${lon.toFixed(5)}`}</p>`;
    el.appendChild(card);
  });
}

async function askLLM(question){
  const out=document.getElementById('llm-output');
  out.innerHTML='<span class="thinking">⏳ Gathering data...</span>';
  const bounds=map.getBounds();
  const [parcels,resources]=await Promise.all([
    queryParcels(bounds),
    queryResources(bounds,Object.keys(RESOURCES))
  ]);
  const context={
    location:{lat:currentLat,lon:currentLon},
    public_parcels:parcels.map(p=>({address:p.SITEADDRESS,owner:p.OWNERNAME1,luc:p.USECD,luc_label:lucLabel(p.USECD),risk:riskClass(p.USECD,p.OWNERNAME1),acres:p.ACRES,property_card:PROP_CARD+p.PARCELID})),
    nearby_resources:resources.map(e=>({type:e.tags?.amenity||e.tags?.shop||e.tags?.highway,name:e.tags?.name||null,lat:e.lat||e.center?.lat,lon:e.lon||e.center?.lon}))
  };
  out.innerHTML='<span class="thinking">⏳ Asking AI...</span>';
  const llm=bestAvailable();
  if(!llm){out.innerHTML='<span style="color:#f85149">No AI provider configured. Tap ⚙️ to add an API key.</span>';return;}
  const system=`You are Sprawlmap, a humanitarian field assistant helping people experiencing homelessness find safe public land and nearby resources in Columbus, Ohio. Use the provided real-time data to answer questions specifically and practically. LUC 640/605 = lowest risk (city-owned). Be direct and useful.`;
  try{
    const reply=await llm.chat([{role:'user',content:`Data:\n${JSON.stringify(context,null,2)}\n\nQuestion: ${question}`}],system);
    out.innerHTML=`<div class="answer">${reply}</div>`;
  }catch(e){out.innerHTML=`<span style="color:#f85149">Error: ${e.message}</span>`;}
}

// ── Settings panel ──────────────────────────────────────────────────────────
const provSel=document.getElementById('providerSelect');
const modSel=document.getElementById('modelSelect');
const keyInp=document.getElementById('apiKeyInput');

Object.entries(PROVIDERS).forEach(([k,v])=>{
  const o=document.createElement('option');
  o.value=k;o.textContent=v.label;
  provSel.appendChild(o);
});

function updateModels(){
  const p=PROVIDERS[provSel.value];
  modSel.innerHTML='';
  p.models.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;modSel.appendChild(o);});
  keyInp.value=loadKey(provSel.value)||'';
  keyInp.placeholder=p.keyHint||'';
}
provSel.addEventListener('change',updateModels);
updateModels();

document.getElementById('settingsBtn').addEventListener('click',()=>document.getElementById('settings-panel').classList.add('open'));
document.getElementById('closeSettings').addEventListener('click',()=>document.getElementById('settings-panel').classList.remove('open'));
document.getElementById('saveSettings').addEventListener('click',()=>{
  saveKey(provSel.value,keyInp.value.trim());
  localStorage.setItem('scout_provider',provSel.value);
  localStorage.setItem('scout_model',modSel.value);
  document.getElementById('settings-panel').classList.remove('open');
  setStatus('✅ Settings saved');
});

// restore saved provider
const savedP=localStorage.getItem('scout_provider');
if(savedP){provSel.value=savedP;updateModels();}
const savedM=localStorage.getItem('scout_model');
if(savedM)modSel.value=savedM;

// ── Map events ──────────────────────────────────────────────────────────────
document.getElementById('locBtn').addEventListener('click',()=>{
  setStatus('📡 Getting GPS...');
  navigator.geolocation.getCurrentPosition(pos=>{
    currentLat=pos.coords.latitude;currentLon=pos.coords.longitude;
    map.setView([currentLat,currentLon],15);
    if(userMarker)userMarker.remove();
    userMarker=L.circleMarker([currentLat,currentLon],{radius:8,fillColor:'#58a6ff',fillOpacity:1,color:'#fff',weight:2}).addTo(map).bindPopup('📍 You').openPopup();
    setStatus('✅ Found. Tap Search to load parcels.');
  },()=>setStatus('❌ GPS unavailable.'));
});

document.getElementById('searchBtn').addEventListener('click',async()=>{
  setStatus('⏳ Searching...');openPanel('parcels');
  const p=await queryParcels(map.getBounds());
  renderParcels(p);
  setStatus(`✅ ${p.length} public parcels in view`);
});

document.getElementById('resBtn').addEventListener('click',async()=>{
  setStatus('🔍 Loading resources...');openPanel('resources');
  const r=await queryResources(map.getBounds(),Object.keys(RESOURCES));
  renderResources(r);
  setStatus(`✅ ${r.length} resources found`);
});

document.getElementById('askBtn').addEventListener('click',()=>openPanel('ask'));
document.getElementById('sendQ').addEventListener('click',()=>{const q=document.getElementById('q').value.trim();if(q)askLLM(q);});
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();document.getElementById('sendQ').click();}});
document.getElementById('handle').addEventListener('click',()=>document.getElementById('panel').classList.toggle('open'));
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>openPanel(t.dataset.tab)));

function openPanel(tab){
  document.getElementById('panel').classList.add('open');
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  ['parcels','resources','ask'].forEach(id=>document.getElementById(`tab-${id}`).style.display=id===tab?'block':'none');
}
</script>
</body>
</html>
